name: "Build&Release"
on:
  push:
    tags:
      - "*"
jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      
      - name: Build
        run: bash build.sh "$GITHUB_REF_NAME"
      
      - name: Release to GitHub
        uses: softprops/action-gh-release@v3
        with:
          files: |
            build/KiPNG.zip
            build/metadata.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}